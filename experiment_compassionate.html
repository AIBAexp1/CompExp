<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대출 심사 실험</title>
  <style>
    body { margin: 0; padding: 20px; background: #f4f7f6; font-family: sans-serif; }
    .jspsych-content { max-width: 1200px; text-align: left; }

    /* ── 레이아웃 ── */
    .exp-container { display: flex; height: 700px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .left-panel  { width: 28%; overflow-y: auto; border-right: 1px solid #ccc; background: #fff; padding: 10px; }
    .right-panel { width: 72%; overflow-y: auto; background: #f4f7f6; padding: 20px; }
    .bottom-bar  { margin-top: 12px; padding: 14px 20px; background: #fff; border: 1px solid #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }

    /* ── 카드 ── */
    .applicant-card { padding: 12px; margin-bottom: 8px; background: white; border: 1px solid #e0e6ed; border-radius: 8px; cursor: pointer; }
    .applicant-card:hover  { background: #f0f4f8; }
    .applicant-card.active { border: 2px solid #3498db; background: #ebf5fb; }
    .applicant-card.selected-for-fund { border-color: #27ae60; background: #eafaf1; }
    .card-row { display: flex; align-items: center; gap: 10px; }
    .card-name { font-size: 15px; font-weight: bold; flex: 1; }
    .rated-badge { font-size: 11px; background: #27ae60; color: white; border-radius: 10px; padding: 2px 7px; white-space: nowrap; }

    /* ── 상세 내용 ── */
    .section-title { font-size: 17px; font-weight: 700; color: #2c3e50; margin: 18px 0 10px; border-bottom: 2px solid #34495e; padding-bottom: 6px; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; margin-bottom: 16px; }
    .data-item { background: white; border: 1px solid #edf2f7; border-radius: 8px; padding: 12px; }
    .data-label { font-size: 12px; color: #7f8c8d; margin-bottom: 4px; }
    .data-value { font-size: 15px; font-weight: 600; color: #34495e; }
    .debt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .debt-card { background: white; border: 1px solid #e0e6ed; border-radius: 8px; padding: 14px; }
    .debt-card h4 { margin: 0 0 10px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 6px; color: #34495e; }
    .debt-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    .debt-reason { margin-top: 8px; font-size: 12px; color: #555; border-top: 1px dashed #eee; padding-top: 6px; }
    .text-box { background: white; border: 1px solid #eee; border-radius: 8px; padding: 16px; margin-bottom: 12px; font-size: 14px; line-height: 1.7; }
    .text-box-title { font-weight: 700; font-size: 13px; color: #7f8c8d; text-transform: uppercase; margin-bottom: 6px; }
    .val-red { color: #e74c3c; } .val-blue { color: #2980b9; } .val-green { color: #27ae60; }

    /* ── AI 요약 ── */
    .summary-card { border-radius: 8px; padding: 16px 18px; margin-bottom: 16px; font-size: 14px; line-height: 1.75; }
    .summary-card.naive         { background: #fafafa; border-left: 4px solid #95a5a6; }
    .summary-card.compassionate { background: #eaf4fc; border-left: 4px solid #2980b9; }
    .summary-label { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #555; }

    /* ── 평가 섹션 (Likert) ── */
    .rating-section { background: white; border: 2px solid #2980b9; border-radius: 8px; padding: 18px 22px; margin-top: 12px; }
    .rating-title   { font-size: 15px; font-weight: 700; color: #1a5276; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #d6eaf8; }
    .rating-item    { margin-bottom: 16px; }
    .rating-q       { font-size: 13px; font-weight: 600; color: #2c3e50; margin-bottom: 4px; }
    .rating-sub     { font-size: 12px; color: #999; margin-bottom: 8px; }
    .likert-row     { display: flex; align-items: center; gap: 6px; }
    .likert-anchor  { font-size: 11px; color: #aaa; min-width: 70px; line-height: 1.3; }
    .likert-anchor.right { text-align: right; }
    .likert-btns    { display: flex; gap: 5px; flex: 1; justify-content: center; }
    .lbtn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #d5d8dc; background: white; font-size: 13px; font-weight: 700; color: #888; cursor: pointer; transition: all 0.12s; }
    .lbtn:hover   { border-color: #2980b9; color: #2980b9; }
    .lbtn.selected { border-color: #2980b9; background: #2980b9; color: white; }
    .rating-done { display: none; text-align: center; margin-top: 10px; padding: 8px; background: #eafaf1; border-radius: 6px; font-size: 13px; font-weight: 600; color: #1e8449; }

    /* ── 선택 버튼 ── */
    .fund-btn { padding: 8px 18px; border-radius: 20px; border: 2px solid #27ae60; background: white; color: #27ae60; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .fund-btn:hover   { background: #27ae60; color: white; }
    .fund-btn.selected { background: #27ae60; color: white; }
    .fund-btn.selected:hover { background: #e74c3c; border-color: #e74c3c; }

    /* ── 하단 바 ── */
    .basket-info { display: flex; align-items: center; gap: 10px; font-size: 15px; }
    .basket-count { font-size: 26px; font-weight: 800; color: #e74c3c; }
    .submit-btn { padding: 11px 30px; font-size: 15px; font-weight: 700; border-radius: 8px; border: none; cursor: not-allowed; background: #ddd; color: #aaa; transition: all 0.2s; }
    .submit-btn.ready { background: #27ae60; color: white; cursor: pointer; }
    .submit-btn.ready:hover { background: #219a52; }

    /* ── 플레이스홀더 ── */
    .placeholder { height: 100%; display: flex; align-items: center; justify-content: center; color: #bbb; text-align: center; }
  </style>
</head>
<body>

      <div class="data-item"><div class="data-label">금융 자산</div><div class="data-value val-blue">${app.demographics.fin_asset}</div></div>

      <div class="data-item"><div class="data-label">총 자산</div><div class="data-value val-blue">${app.demographics.total_asset}</div></div>
    </div>
    <div class="section-title">채무 내역</div>
    <div class="debt-grid">
      <div class="debt-card"><h4>🏦 신용회복위원회</h4>
        <div class="debt-row"><span>총 채무</span><span class="val-red">${app.debt_shin.total}</span></div>
        <div class="debt-row"><span>잔액</span><span class="val-red">${app.debt_shin.balance}</span></div>
        <div class="debt-row"><span>월 상환</span><span>${app.debt_shin.monthly}</span></div>
        <div class="debt-row"><span>납입 현황</span><span>${app.debt_shin.history}</span></div>
        <div class="debt-reason"><b>사유:</b> ${app.debt_shin.reason}</div>
      </div>
      <div class="debt-card"><h4>💳 추가 대출</h4>
        <div class="debt-row"><span>여부</span><span>${app.debt_add.exist}</span></div>
        <div class="debt-row"><span>잔액</span><span class="val-red">${app.debt_add.balance}</span></div>
        <div class="debt-row"><span>월 상환</span><span>${app.debt_add.monthly}</span></div>
        <div class="debt-row"><span>이자율</span><span class="val-red">${app.debt_add.rate}</span></div>
        <div class="debt-reason"><b>사유:</b> ${app.debt_add.reason}</div>
      </div>
    </div>
    <div class="section-title">자기소개 및 지원 정보</div>
    <div class="text-box"><div class="text-box-title">자기소개</div>${app.story.intro}</div>
    <div class="text-box"><div class="text-box-title">지원금 사용 계획</div>${app.story.need}</div>
    <div class="text-box"><div class="text-box-title">향후 계획</div>${app.story.plan}</div>
    ${ratingHtml(app.id)}`;
}

/* ── 5. 전역 핸들러 ── */
window.rate = function(appId, qKey, val, btn) {
  document.getElementById(`lb-${appId}-${qKey}`)
    .querySelectorAll('.lbtn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  ratings[appId][qKey] = val;
  if (RATING_QS.every(q => ratings[appId][q.key] !== null)) {
    const d = document.getElementById(`rd-${appId}`);
    if (d) d.style.display = 'block';
    const card = document.getElementById(`card-${appId}`);
    if (card && !card.querySelector('.rated-badge')) {
      const b = document.createElement('span');
      b.className = 'rated-badge'; b.textContent = '평가완료 ✓';
      card.querySelector('.card-name').after(b);
    }
    // 모든 지원자 평가 완료 시 차단 메시지 숨김
    const allDone = shuffled.every(a => RATING_QS.every(q => ratings[a.id][q.key] !== null));
    if (allDone) {
      const msg = document.getElementById('submit-block-msg');
      if (msg) msg.style.display = 'none';
    }
  }
};

window.toggleFund = function(appId) {
  if (selected.has(appId)) {
    selected.delete(appId);
  } else {
    if (selected.size >= 5) { alert('최대 5명까지만 선택할 수 있습니다.'); return; }
    selected.add(appId);
  }
  syncCard(appId);
  updateBasket();
};

function syncCard(appId) {
  const chk  = document.getElementById(`chk-${appId}`);
  const card = document.getElementById(`card-${appId}`);
  const fb   = document.getElementById(`fb-${appId}`);
  const isSel = selected.has(appId);
  if (chk)  chk.checked = isSel;
  if (card) card.classList.toggle('selected-for-fund', isSel);
  if (fb)  { fb.classList.toggle('selected', isSel); fb.textContent = isSel ? '✓ 선택됨 (클릭 시 해제)' : '+ 승인 대상 추가'; }
}

function updateBasket() {
  const c = document.getElementById('bcount');
  if (c) c.textContent = selected.size;
  const btn = document.getElementById('sbtn');
  if (btn) {
    if (selected.size === 5) { btn.className = 'submit-btn ready'; btn.textContent = '최종 제출하기 →'; btn.disabled = false; }
    else { btn.className = 'submit-btn'; btn.textContent = `${5-selected.size}명 더 선택해주세요`; btn.disabled = true; }
  }
}

window.handleSubmit = function() {
  if (selected.size !== 5) return;

  // 평가 미완료 지원자 확인 — 있으면 차단
  const unrated = shuffled.filter(a => RATING_QS.some(q => ratings[a.id][q.key] === null));
  if (unrated.length > 0) {
    const names = unrated.map(a => `<b>${a.name}</b>`).join(', ');
    const box = document.getElementById('submit-block-msg');
    box.innerHTML = `⚠️ 아직 평가를 완료하지 않은 지원자가 있습니다: ${names}<br>
      <span style="font-size:12px;color:#888;">각 지원서 하단의 평가 항목(①②③)을 모두 선택해주세요.</span>`;
    box.style.display = 'block';
    // 첫 번째 미완료 지원자 카드로 스크롤 & 하이라이트
    const firstCard = document.getElementById('card-' + unrated[0].id);
    if (firstCard) {
      firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      firstCard.style.outline = '2px solid #e74c3c';
      setTimeout(() => { firstCard.style.outline = ''; }, 2000);
    }
    return;
  }

  // 통과 — 제출
  document.getElementById('submit-block-msg').style.display = 'none';
  if (curId) viewingMs[curId] += performance.now() - viewStart;
  jsPsych.finishTrial({
    selected_applicants: Array.from(selected),
    viewing_times_ms:    viewingMs,
    view_counts:         viewCounts,
    ratings:             ratings,
    total_time_ms:       Math.round(performance.now() - totalStart),
    applicant_order:     shuffled.map(a => a.id)
  });
};

/* ── 6. 메인 Trial ── */
const condLabel = { control:'요약 없음', naive:'AI 표준 요약', compassionate:'AI 공감형 요약' };

const main_task = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
      <b style="font-size:16px;">대출 심사 실험</b>

    </div>
    <div class="exp-container">
      <div class="left-panel">
        <div style="font-size:12px;font-weight:700;color:#999;padding:4px 6px 10px;border-bottom:1px solid #eee;margin-bottom:8px;">지원자 목록 (10명)</div>
        <div id="app-list"></div>
      </div>
      <div class="right-panel" id="right-panel">
        <div class="placeholder"><div><div style="font-size:40px;">👈</div><p>지원자를 클릭해 상세 내용을 확인하세요</p><p style="font-size:13px;color:#ccc;">모든 지원자 검토 후 5명을 선택해주세요</p></div></div>
      </div>
    </div>
    <div id="submit-block-msg" style="display:none; margin-top:8px; padding:10px 16px;
      background:#fff3f3; border:1.5px solid #e74c3c; border-radius:8px;
      font-size:13px; color:#c0392b; line-height:1.6;"></div>
    <div class="bottom-bar">
      <div class="basket-info">
        <span>승인 선택:</span>
        <span class="basket-count" id="bcount">0</span>
        <span style="font-size:18px;color:#aaa;">/ 5명</span>
      </div>
      <button id="sbtn" class="submit-btn" disabled onclick="handleSubmit()">5명 더 선택해주세요</button>
    </div>`,
  choices: [],
  on_load: function() {
    totalStart = performance.now();
    const listDiv = document.getElementById('app-list');
    const rightPanel = document.getElementById('right-panel');

    shuffled.forEach(app => {
      const card = document.createElement('div');
      card.className = 'applicant-card';
      card.id = `card-${app.id}`;
      card.innerHTML = `
        <div class="card-row">
          <input type="checkbox" id="chk-${app.id}" style="transform:scale(1.4);cursor:pointer;">
          <span class="card-name">${app.name} 지원서</span>
        </div>
`;
      listDiv.appendChild(card);

      // 카드 클릭 → 상세 보기
      card.addEventListener('click', e => {
        if (e.target.type === 'checkbox') return;
        if (curId) viewingMs[curId] += performance.now() - viewStart;
        viewCounts[app.id]++;
        curId = app.id;
        viewStart = performance.now();
        document.querySelectorAll('.applicant-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        // 열람 횟수 tracking만 (표시 안함)
        rightPanel.innerHTML = detailHtml(app);
      });

      // 체크박스 클릭 → 선택 토글
      document.getElementById(`chk-${app.id}`).addEventListener('change', e => {
        if (e.target.checked && selected.size >= 5) {
          alert('최대 5명까지만 선택할 수 있습니다.');
          e.target.checked = false; return;
        }
        if (e.target.checked) selected.add(app.id);
        else selected.delete(app.id);
        syncCard(app.id);
        updateBasket();
      });
    });
  }
};

jsPsych.run([main_task]);
</script>
</body>
</html>
