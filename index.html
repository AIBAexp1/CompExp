<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대출 심사 실험</title>
<style>
body { margin: 0; padding: 20px; background: #f4f7f6; font-family: 'Malgun Gothic', sans-serif; font-size: 16px; color: #2c3e50; }
.jspsych-content { max-width: 1200px; text-align: left; }

/* ── 레이아웃 ── */
.exp-container { display: flex; height: 720px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.left-panel { width: 26%; overflow-y: auto; border-right: 1px solid #ccc; background: #fff; padding: 10px; }
.right-panel { width: 74%; overflow-y: auto; background: #f4f7f6; padding: 20px; }
.bottom-bar { margin-top: 12px; padding: 14px 20px; background: #fff; border: 1px solid #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }

/* ── 카드 ── */
.applicant-card { padding: 12px; margin-bottom: 8px; background: white; border: 1px solid #e0e6ed; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
.applicant-card:hover { background: #f0f4f8; }
.applicant-card.active { border: 2px solid #3498db; background: #ebf5fb; }
.applicant-card.decided { border-color: #27ae60; background: #eafaf1; }
.card-row { display: flex; align-items: center; gap: 10px; }
.card-name { font-size: 16px; font-weight: bold; flex: 1; }
.decided-badge { font-size: 12px; background: #27ae60; color: white; border-radius: 10px; padding: 2px 7px; white-space: nowrap; display: none; }
.applicant-card.decided .decided-badge { display: inline; }

/* ── 섹션 제목 ── */
.section-title { font-size: 19px; font-weight: 700; color: #2c3e50; margin: 18px 0 10px; border-bottom: 2px solid #34495e; padding-bottom: 6px; }

/* ── 접이식 섹션 (기본정보/채무/서술) ── */
.collapsible { border: 1px solid #e0e6ed; border-radius: 8px; margin-bottom: 10px; background: #fff; overflow: hidden; }
.collapsible-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; font-size: 16px; font-weight: 700; color: #34495e; background: #f8fafb; user-select: none; }
.collapsible-header:hover { background: #eef3f6; }
.collapsible-header .chevron { font-size: 13px; color: #888; }
.collapsible-body { display: none; padding: 16px 18px; }
.collapsible.open .collapsible-body { display: block; }

/* ── 기본 정보 그리드 ── */
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 10px; }
.data-item { background: #fbfcfd; border: 1px solid #edf2f7; border-radius: 8px; padding: 12px; }
.data-label { font-size: 13px; color: #7f8c8d; margin-bottom: 4px; }
.data-value { font-size: 16px; font-weight: 600; color: #34495e; }

/* ── 부채 ── */
.debt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.debt-card { background: #fbfcfd; border: 1px solid #e0e6ed; border-radius: 8px; padding: 14px; }
.debt-card h4 { margin: 0 0 10px; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 6px; color: #34495e; }
.debt-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 5px; }
.debt-reason { margin-top: 8px; font-size: 14px; color: #666; border-top: 1px dashed #ddd; padding-top: 6px; }
.highlight-red { color: #e74c3c; }
.highlight-blue { color: #2980b9; }

/* ── 서술 텍스트 ── */
.text-box { background: #fdfdfd; border: 1px solid #eee; padding: 14px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; line-height: 1.75; white-space: pre-wrap; }
.text-box-title { font-weight: 700; font-size: 15px; color: #555; margin-bottom: 6px; border-bottom: 1px dashed #ccc; padding-bottom: 4px; }

/* ── 요약 카드 (강조) ── */
.summary-section { background: #eaf3ff; border: 2px solid #b6d4f5; padding: 22px; margin-bottom: 20px; border-radius: 10px; }
.summary-card { background: #fff; border: 1px solid #d0e2f5; border-left: 6px solid #3498db; padding: 20px 24px; border-radius: 0 10px 10px 0; box-shadow: 0 3px 8px rgba(52,152,219,0.12); }
.summary-card ul { margin: 0; padding-left: 22px; }
.summary-card li { margin-bottom: 11px; line-height: 1.75; font-size: 17px; }
.summary-card li:last-child { margin-bottom: 0; }

/* ── 평가 영역 (지원서와 구분) ── */
.rating-block { background: #fff; border: 2px solid #2980b9; border-radius: 12px; padding: 22px 24px; margin-top: 28px; box-shadow: 0 2px 10px rgba(41,128,185,0.1); }
.rating-block-title { font-size: 19px; font-weight: 800; color: #1a5276; margin: 0 0 6px; }
.rating-block-desc { font-size: 14px; color: #7f8c8d; margin-bottom: 18px; }
.rating-area { background: #f8fbfd; border: 1px solid #d6e4f0; border-radius: 8px; padding: 18px; margin-bottom: 14px; }
.rating-area:last-of-type { margin-bottom: 0; }
.rating-area label { font-size: 16px; font-weight: 600; display: block; margin-bottom: 12px; color: #2c3e50; }
.likert-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.likert-row span.anchor { font-size: 13px; color: #888; white-space: nowrap; }
.likert-row label.radio-label { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 14px; color: #555; cursor: pointer; }
.likert-row input[type=radio] { cursor: pointer; transform: scale(1.2); }

/* 지원서 영역과 평가 영역 사이 구분선 */
.section-divider { margin: 28px 0 0; border: none; border-top: 3px dashed #cdd6dd; }

/* ── 버튼 ── */
.btn-primary { background: #3498db; color: white; border: none; padding: 11px 30px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 600; }
.btn-primary:hover { background: #2980b9; }
.btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; }
.btn-submit { background: #27ae60; }
.btn-submit:hover { background: #219a52; }

/* ── 진행 표시 ── */
.progress-info { font-size: 14px; color: #7f8c8d; }

/* ── 승인 버튼 (평가 블록 내부, 하단) ── */
.fund-btn { padding: 12px 26px; border-radius: 24px; border: 2px solid #27ae60; background: white; color: #27ae60; font-weight: 700; font-size: 16px; cursor: pointer; white-space: nowrap; }
.fund-btn:hover { background: #27ae60; color: white; }
.fund-btn.selected { background: #27ae60; color: white; }
.fund-btn.selected:hover { background: #e74c3c; border-color: #e74c3c; }

/* ── 승인 선택 ── */
.applicant-card.fund-selected { border-color: #27ae60; background: #eafaf1; }
.fund-selected .card-name { color: #1e8449; }

/* ── 로딩 ── */
#loading-screen { display: flex; align-items: center; justify-content: center; height: 300px; font-size: 18px; color: #7f8c8d; }
</style>

// 세션별 지원자 샘플링: type1→1, type2→2, type3→1 (총 4명)
// ──────────────────────────────────────────────
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const FIXED_APPLICANT_IDS = ['VmhPv', 'YSOFu', '7VvLx', '2y7Vf'];

function sampleApplicants(allData) {
  const byId = Object.fromEntries(allData.map(a => [a.id, a]));
  const fixed = FIXED_APPLICANT_IDS.map(id => byId[id]).filter(Boolean);
  if (fixed.length !== FIXED_APPLICANT_IDS.length) {
    console.warn('FIXED_APPLICANT_IDS 중 일부를 APPLICANTS_DATA에서 찾지 못했습니다.', FIXED_APPLICANT_IDS, fixed.map(a=>a.id));
  }
  // 표시 순서만 랜덤화 (지원자 구성은 고정)
  return shuffleArray(fixed);
}

    .split('\n')

        <ul>${items}</ul>

  `;
}

      <label>${q.label}</label>
      ${q.sub ? `<div style="font-size:12px;color:#999;margin-bottom:6px;">${q.sub}</div>` : ''}
      <div class="likert-row">
        <span class="anchor">${q.L}</span>
        ${[1,2,3,4,5,6,7].map(v => `

function buildLeftPanel() {
  const panel = document.getElementById('left-panel');
  panel.innerHTML = '';
  SESSION_APPLICANTS.forEach((a, idx) => {
    const card = document.createElement('div');
    card.className = 'applicant-card' + (idx === currentIdx ? ' active' : '') + (submittedIds.has(a.id) ? ' decided' : '');
    card.id = `card-${a.id}`;
    card.innerHTML = `
      <div class="card-row">
        <input type="checkbox" id="chk-${a.id}" style="transform:scale(1.3); cursor:pointer; margin-right:6px;" ${selectedIds.has(a.id) ? 'checked' : ''}>
        <span class="card-name">${a.name}</span>
        <span class="decided-badge">평가완료</span>
      </div>
      <div style="font-size:12px; color:#888; margin-top:4px;">${a.age}세 · ${a.region} · ${a.employment}</div>
    `;
    card.addEventListener('click', e => {
      if (e.target.type === 'checkbox') return;
      selectApplicant(idx);
    });
    const chk = card.querySelector(`#chk-${a.id}`);
    chk.addEventListener('change', e => {
      if (e.target.checked && selectedIds.size >= 2) {
        alert('최대 2명까지만 선택할 수 있습니다.');
        e.target.checked = false; return;
      }
      if (e.target.checked) selectedIds.add(a.id);
      else selectedIds.delete(a.id);
      card.classList.toggle('fund-selected', selectedIds.has(a.id));
      updateFinalSubmit();
    });
    panel.appendChild(card);
  });
}

function selectApplicant(idx) {
  // 같은 지원자를 다시 누른 경우: 아무것도 하지 않음 (열람 횟수/시간 중복 방지)
  if (idx === currentIdx) return;

  // 이전 카드 viewing time 기록
  if (currentIdx !== null && SESSION_APPLICANTS[currentIdx]) {
    const prevId = SESSION_APPLICANTS[currentIdx].id;
    if (startTimes[prevId]) {
      viewingTimes[prevId] = (viewingTimes[prevId] || 0) + (Date.now() - startTimes[prevId]);
    }
  }

  currentIdx = idx;
  const a = SESSION_APPLICANTS[idx];
  startTimes[a.id] = Date.now();
  viewCounts[a.id] = (viewCounts[a.id] || 0) + 1;  // 이 지원자로 전환한 횟수

  // 카드 active 표시 갱신
  document.querySelectorAll('.applicant-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${a.id}`);
  if (card) card.classList.add('active');

  // 요약문 선택
  const sData = SUMMARIES[a.id] || {};
  let summaryText = '';
  if (CONDITION === 'naive') summaryText = sData.naive || '';
  else if (CONDITION === 'compassionate') summaryText = sData.compassionate || '';

  const summaryHTML = buildSummaryHTML(summaryText, CONDITION);
  const ratingsHTML = buildLikertHTML(a.id);
  const detailHTML  = renderDetail(a, summaryHTML, ratingsHTML);

  // 우측 패널
  const rightPanel = document.getElementById('right-panel');
  rightPanel.innerHTML = `<div id="detail-area">${detailHTML}</div>`;
  rightPanel.scrollTop = 0;  // 항상 최상단부터 보이게

  // 기존 응답 복원
  if (responses[a.id]) {
    Object.entries(responses[a.id]).forEach(([qid, val]) => {
      const radio = document.querySelector(`input[name="${a.id}_${qid}"][value="${val}"]`);
      if (radio) radio.checked = true;
    });
  }

  // 라디오 변경 시 제출 버튼 활성화 체크
  attachRadioListeners(a.id);

  updateSubmitBtn();
}

function checkSubmitReady() {
  const a = SESSION_APPLICANTS[currentIdx];
  if (!a) return;
  responses[a.id] = responses[a.id] || {};
  QUESTIONS.forEach(q => {
    const checked = document.querySelector(`input[name="${a.id}_${q.id}"]:checked`);
    if (checked) responses[a.id][q.id] = parseInt(checked.value);
  });
  updateSubmitBtn();
}

function updateSubmitBtn() {
  const a = SESSION_APPLICANTS[currentIdx];
  if (!a) return;
  const btn = document.getElementById(`submit-btn-${a.id}`);
  if (!btn) return;
  const allAnswered = QUESTIONS.every(q => responses[a.id] && responses[a.id][q.id]);
  const isSubmitted = submittedIds.has(a.id);

  if (isSubmitted) {
    // 제출 완료 상태: 클릭하면 해제 가능, 항상 활성
    btn.disabled = false;
    btn.textContent = '✅ 평가 완료 (클릭하면 수정)';
    btn.style.background = '#7f8c8d';
    document.getElementById('bottom-status').textContent = '평가가 완료되었습니다. 버튼을 클릭하면 수정할 수 있습니다.';
  } else {
    // 미제출 상태: 전체 응답 시에만 활성
    btn.disabled = !allAnswered;
    btn.textContent = '이 지원자 평가 완료';
    btn.style.background = allAnswered ? '' : '';
    document.getElementById('bottom-status').textContent = allAnswered ? '모든 문항에 응답했습니다. 평가를 완료하세요.' : '모든 문항에 응답한 후 평가를 완료하세요.';
  }
}

function submitCurrent() {
  const a = SESSION_APPLICANTS[currentIdx];
  if (!a) return;

  // ── 이미 제출된 경우: 해제(수정 모드)로 전환 ──
  if (submittedIds.has(a.id)) {
    submittedIds.delete(a.id);
    const card = document.getElementById(`card-${a.id}`);
    if (card) card.classList.remove('decided');
    // 현재 스크롤 위치 저장
    const panel = document.getElementById('right-panel');
    const scrollPos = panel ? panel.scrollTop : 0;
    // 우측 패널 재렌더링 (잠금 해제)
    const sData = SUMMARIES[a.id] || {};
    let summaryText = '';
    if (CONDITION === 'naive') summaryText = sData.naive || '';
    else if (CONDITION === 'compassionate') summaryText = sData.compassionate || '';
    const summaryHTML = buildSummaryHTML(summaryText, CONDITION);
    const ratingsHTML = buildLikertHTML(a.id);
    const detailHTML  = renderDetail(a, summaryHTML, ratingsHTML);
    panel.innerHTML = `<div id="detail-area">${detailHTML}</div>`;
    panel.scrollTop = scrollPos;  // 스크롤 위치 복원
    restoreResponses(a.id);
    attachRadioListeners(a.id);
    updateProgress();
    updateFinalSubmit();
    return;
  }

  // ── 신규 제출 ──
  // 마지막 viewing time 기록
  if (startTimes[a.id]) {
    viewingTimes[a.id] = (viewingTimes[a.id] || 0) + (Date.now() - startTimes[a.id]);
    startTimes[a.id] = null;
  }

  // 응답 확인
  checkSubmitReady();
  const allAnswered = QUESTIONS.every(q => responses[a.id] && responses[a.id][q.id]);
  if (!allAnswered) { alert('모든 문항에 응답해주세요.'); return; }

  submittedIds.add(a.id);

  // 카드 업데이트
  const card = document.getElementById(`card-${a.id}`);
  if (card) card.classList.add('decided');

  // 우측 패널 재렌더링 (Likert 잠금 적용)
  const sData = SUMMARIES[a.id] || {};
  let summaryText = '';
  if (CONDITION === 'naive') summaryText = sData.naive || '';
  else if (CONDITION === 'compassionate') summaryText = sData.compassionate || '';
  const summaryHTML = buildSummaryHTML(summaryText, CONDITION);
  const ratingsHTML = buildLikertHTML(a.id);
  const detailHTML  = renderDetail(a, summaryHTML, ratingsHTML);
  document.getElementById('right-panel').innerHTML = `<div id="detail-area">${detailHTML}</div>`;
  restoreResponses(a.id);

  updateProgress();
  updateFinalSubmit();

  // 다음 미완료 지원자로 자동 이동
  const nextIdx = findNextUnsubmitted(currentIdx);
  if (nextIdx !== -1) {
    selectApplicant(nextIdx);
  }
}

// 응답 복원 헬퍼
function restoreResponses(appId) {
  if (!responses[appId]) return;
  QUESTIONS.forEach(q => {
    const val = responses[appId][q.id];
    if (val) {
      const radio = document.querySelector(`input[name="${appId}_${q.id}"][value="${val}"]`);
      if (radio) radio.checked = true;
    }
  });
}

// 라디오 이벤트 재부착 헬퍼
function attachRadioListeners(appId) {
  document.querySelectorAll(`input[name^="${appId}_"]`).forEach(r => {
    r.addEventListener('change', checkSubmitReady);
  });
}

// 현재 인덱스 이후부터 순환하며 미제출 지원자 찾기
function findNextUnsubmitted(fromIdx) {
  const n = SESSION_APPLICANTS.length;
  for (let step = 1; step <= n; step++) {
    const idx = (fromIdx + step) % n;
    if (!submittedIds.has(SESSION_APPLICANTS[idx].id)) return idx;
  }
  return -1;  // 전부 제출됨
}

function updateProgress() {
  const el = document.getElementById('progress-info');
  if (el) el.textContent = `${submittedIds.size} / ${SESSION_APPLICANTS.length} 완료`;
}

function toggleCollapse(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  const chevron = el.querySelector('.chevron');
  if (chevron) chevron.textContent = el.classList.contains('open') ? '▲ 접기' : '▼ 펼쳐보기';

  // 펼쳤을 때 기록
  if (el.classList.contains('open')) {
    const m = id.match(/^col-(info|debt|story)-(.+)$/);
    if (m) {
      const section = m[1];
      const appId = m[2];
      if (!expandedSections[appId]) expandedSections[appId] = { info:false, debt:false, story:false };
      expandedSections[appId][section] = true;
    }
  }
}

function toggleFundBtn(appId) {
  const chk = document.getElementById(`chk-${appId}`);
  const btn = document.getElementById(`fb-${appId}`);
  const card = document.getElementById(`card-${appId}`);
  if (selectedIds.has(appId)) {
    selectedIds.delete(appId);
    if (chk) chk.checked = false;
    if (btn) { btn.classList.remove('selected'); btn.textContent = '+ 이 지원자를 승인 대상자로 선택'; }
    if (card) card.classList.remove('fund-selected');
  } else {
    if (selectedIds.size >= 2) { alert('최대 2명까지만 선택할 수 있습니다.'); return; }
    selectedIds.add(appId);
    if (chk) chk.checked = true;
    if (btn) { btn.classList.add('selected'); btn.textContent = '✓ 승인 대상자로 선택됨 (클릭 시 해제)'; }
    if (card) card.classList.add('fund-selected');
  }
  updateFinalSubmit();
}

function updateFinalSubmit() {
  const countEl = document.getElementById('fund-count');
  const btn = document.getElementById('final-submit-btn');
  const blockMsg = document.getElementById('fund-block-msg');
  if (countEl) countEl.textContent = selectedIds.size;
  if (btn) {
    const allEvaluated = SESSION_APPLICANTS.every(a => submittedIds.has(a.id));
    const ready = selectedIds.size === 2 && allEvaluated;
    btn.disabled = !ready;
    if (ready) {
      btn.style.background = '#27ae60'; btn.style.color = 'white'; btn.style.cursor = 'pointer';
    } else {
      btn.style.background = '#ddd'; btn.style.color = '#aaa'; btn.style.cursor = 'not-allowed';
    }
    if (blockMsg) blockMsg.style.display = (!allEvaluated && selectedIds.size === 2) ? 'inline' : 'none';
  }
}

function handleFinalSubmit() {
  const allEvaluated = SESSION_APPLICANTS.every(a => submittedIds.has(a.id));
  if (selectedIds.size !== 2 || !allEvaluated) return;
  finishExperiment();
}

function finishExperiment() {
  // ── 데이터 패키징 ──
  const output = {
    response_id: RESPONSE_ID,
    participant: PARTICIPANT,
    condition: CONDITION,
    summaries_version: SUMMARIES.__version__ || 'unknown',
    session_applicants: SESSION_APPLICANTS.map(a => a.id),
    selected_applicants: Array.from(selectedIds),
    app_type_map: Object.fromEntries(SESSION_APPLICANTS.map(a => [a.id, APP_TYPE_MAP[a.id]])),
    responses,
    viewing_times_ms: viewingTimes,
    view_counts: viewCounts,
    expanded_sections: expandedSections,
    timestamp: new Date().toISOString()
  };
  console.log('EXPERIMENT_DATA', JSON.stringify(output));

  // ── 완료 화면 (데이터 전송 중 메시지) ──
  document.getElementById('experiment-container').innerHTML = `
    <div style="text-align:center; padding:60px 20px; max-width:600px; margin:0 auto;">
      <h2 style="color:#27ae60; font-size:26px;">✅ 모든 평가가 완료되었습니다!</h2>

      <div style="margin-top:24px; padding:20px 24px; background:#f0f7ff; border:1px solid #b6d4f5; border-radius:10px; text-align:left; font-size:15px; line-height:1.8; color:#2c3e50;">
        <strong>📋 잠깐! 설문이 아직 끝나지 않았습니다.</strong><br>
        실험 참여 후 <strong>사후 설문(약 3~5분)</strong>이 남아 있습니다.<br>
        데이터 저장이 완료되면 자동으로 이동하오니, 잠시만 기다려 주세요.
      </div>

      <div style="margin-top:24px;">
        <p id="save-status" style="color:#555; font-size:16px; font-weight:600;">
          💾 응답 데이터를 저장하는 중입니다...
        </p>
        <p style="color:#aaa; font-size:13px; margin-top:4px;">
          인터넷 환경에 따라 저장에 다소 시간이 소요될 수 있습니다.
        </p>
        ${IN_IFRAME ? `
          <p style="color:#888; margin-top:8px; font-size:15px;">
            잠시 후 자동으로 다음 화면으로 넘어갑니다.
          </p>
        ` : (RETURN_URL ? `
          <p style="color:#888; margin-top:8px; font-size:15px;">
            저장 완료 후 <strong><span id="countdown" style="color:#2980b9;">-</span>초</strong> 뒤 자동으로 이동합니다.
          </p>
          <p style="margin-top:16px;">
            <a id="manual-link" href="${RETURN_URL}"
               style="display:inline-block; background:#bdc3c7; color:white; padding:12px 32px;
                      border-radius:8px; text-decoration:none; font-weight:700; font-size:15px;
                      pointer-events:none;">
              설문으로 바로 이동하기
            </a>
          </p>
          <p style="color:#bbb; font-size:13px; margin-top:8px;">
            (자동 이동이 되지 않을 경우 위 버튼을 클릭해 주세요)
          </p>
        ` : '<p style="color:#aaa; font-size:14px; margin-top:16px;">이 창을 닫아도 됩니다.</p>')}
      </div>

      <details style="margin-top:30px; text-align:left;">
        <summary style="cursor:pointer; color:#ccc; font-size:12px;">데이터 확인 (개발용)</summary>
        <pre style="font-size:11px; background:#f4f4f4; padding:12px; border-radius:6px; overflow:auto;">${JSON.stringify(output, null, 2)}</pre>
      </details>
    </div>
  `;

  // ── DataPipe 저장 후 redirect ──
  const EXPERIMENT_ID = 'yLA2GpFCObm6';
  // 파일명: ResponseID 우선 (Qualtrics 데이터와 병합 key). 없으면 PID/타임스탬프 fallback
  const fileKey = RESPONSE_ID || PARTICIPANT || 'NOID';
  const filename = `${fileKey}_${Date.now()}.json`;

  function startRedirect() {
    const statusEl = document.getElementById('save-status');
    const linkEl   = document.getElementById('manual-link');
    if (statusEl) statusEl.textContent = '✅ 저장이 완료되었습니다!';
    if (linkEl) {
      linkEl.style.background = '#27ae60';
      linkEl.style.pointerEvents = 'auto';
    }
    if (!RETURN_URL) return;
    let count = 3;
    const el = document.getElementById('countdown');
    if (el) el.textContent = count;
    const timer = setInterval(() => {
      count--;
      if (el) el.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = RETURN_URL;
      }
    }, 1000);
  }

  // iframe 안이면 페이지 이동 없이 부모(Qualtrics)에게 postMessage로 결과 전달.
  // 아니면(단독 실행/구버전 fallback) 기존 redirect 로직 사용.
  function completeAndExit() {
    const statusEl = document.getElementById('save-status');
    if (IN_IFRAME) {
      if (statusEl) statusEl.textContent = '✅ 저장이 완료되었습니다!';
      try {
        window.parent.postMessage({ type: 'compexp_done', payload: output }, '*');
        console.log('postMessage 전송 완료 (compexp_done)');
      } catch (e) {
        console.error('postMessage 전송 실패:', e);
      }
      return;
    }
    startRedirect();
  }

  fetch('https://pipe.jspsych.org/api/data/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      experimentID: EXPERIMENT_ID,
      filename: filename,
      data: JSON.stringify(output)
    })
  })
  .then(res => {
    if (!res.ok) throw new Error('DataPipe 응답 오류: ' + res.status);
    return res.json();
  })
  .then(() => {
    console.log('DataPipe 저장 완료:', filename);
    completeAndExit();
  })
  .catch(err => {
    // 저장 실패해도 진행은 계속 (데이터 유실 로그만 남김)
    console.error('DataPipe 저장 실패:', err);
    const statusEl = document.getElementById('save-status');
    if (statusEl) statusEl.textContent = '⚠️ 저장 중 오류가 발생했지만, 계속 진행합니다.';
    completeAndExit();
  });
}

// ──────────────────────────────────────────────
// 초기화: summaries.json fetch → 세션 샘플링 → UI 빌드
// ──────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(SUMMARIES_URL);
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    // { version, applicants: { id: { name, app_type, naive, compassionate } } }
    SUMMARIES = json.applicants || {};
    SUMMARIES.__version__ = json.version || '';
  } catch(e) {
    console.warn('summaries.json fetch 실패, 요약 없이 진행합니다.', e);
    SUMMARIES = {};
  }

  SESSION_APPLICANTS = sampleApplicants(APPLICANTS_DATA);

  // 초기 responses 객체 생성
  SESSION_APPLICANTS.forEach(a => { responses[a.id] = {}; viewingTimes[a.id] = 0; viewCounts[a.id] = 0; expandedSections[a.id] = { info:false, debt:false, story:false }; });

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('experiment-container').style.display = 'block';

  buildExperiment();

  // 첫 번째 카드 자동 선택
  if (SESSION_APPLICANTS.length > 0) selectApplicant(0);
}

init();
</script>
